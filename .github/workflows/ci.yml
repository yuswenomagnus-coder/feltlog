name: CI
on:
  push:
  pull_request:

jobs:
  governance:
    name: Constitutional structure check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run structure check
        run: bash scripts/check-structure.sh

  # Product build/test jobs are added at Stage 6 of the first implementation
