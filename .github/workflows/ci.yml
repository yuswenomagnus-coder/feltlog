name: CI
on:
  push:
  pull_request:

jobs:
  governance:
    name: Constitutional structure check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run structure check
        run: bash scripts/check-structure.sh

  product:
    name: Product lint and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint
      - name: Run build
        run: npm run build
